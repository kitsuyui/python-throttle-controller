name: Bug report
description: Report behavior that is not working as expected.
title: "Bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a problem with `throttle-controller`.
        Please include enough detail for maintainers to reproduce the behavior.
  - type: input
    id: package-version
    attributes:
      label: throttle-controller version
      description: The installed package version.
      placeholder: "0.3.1"
    validations:
      required: true
  - type: input
    id: python-version
    attributes:
      label: Python version
      description: The Python version used when the problem occurred.
      placeholder: "3.13.1"
    validations:
      required: true
  - type: input
    id: operating-system
    attributes:
      label: Operating system
      description: The operating system and version.
      placeholder: "macOS 15.5, Ubuntu 24.04, Windows 11"
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: Provide the smallest code sample or sequence of steps that reproduces the issue.
      placeholder: |
        from throttle_controller import SimpleThrottleController

        throttle = SimpleThrottleController.create(default_cooldown_time=3.0)
        ...
    validations:
      required: true
  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual-behavior
    attributes:
      label: Actual behavior
      description: What happened instead? Include traceback or logs when available.
    validations:
      required: true
  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: Add any extra context that may help explain the issue.
    validations:
      required: false
