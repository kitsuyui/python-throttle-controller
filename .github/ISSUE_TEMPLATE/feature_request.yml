name: Feature request
description: Suggest an improvement or new capability.
title: "Feature: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement to `throttle-controller`.
        Please describe the use case and the behavior you need.
  - type: textarea
    id: use-case
    attributes:
      label: Use case
      description: What are you trying to accomplish?
      placeholder: "I want to throttle calls to ..."
    validations:
      required: true
  - type: textarea
    id: proposed-behavior
    attributes:
      label: Proposed behavior
      description: Describe the behavior or API you would like to see.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Describe any workaround or alternative design you considered.
    validations:
      required: false
  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: Add examples, links, or constraints that may help evaluate the request.
    validations:
      required: false
